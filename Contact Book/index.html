<!DOCTYPE html>
<html><head><title>Contact Book</title><style>body{font-family:Arial;max-width:600px;margin:20px auto;padding:10px}input{display:block;width:100%;margin:5px 0;padding:8px;box-sizing:border-box}button{background:#007bff;color:white;padding:10px 15px;border:none;cursor:pointer;margin:5px 0}button:hover{background:#0056b3}.contact{border:1px solid #ddd;padding:10px;margin:5px 0;display:flex;justify-content:space-between;align-items:center}.actions button{background:#28a745;margin-left:5px}.actions .delete{background:#dc3545}</style></head><body><h1>Contact Book</h1><input id="search" placeholder="Search by name or phone..." onkeyup="render()"><div id="form"><input id="name" placeholder="Name"><input id="phone" placeholder="Phone"><input id="email" placeholder="Email"><input id="address" placeholder="Address"><button onclick="saveContact()">Add Contact</button></div><div id="list"></div><script>let contacts=JSON.parse(localStorage.getItem('contacts'))||[];let editIndex=-1;function saveContact(){const c={name:document.getElementById('name').value,phone:document.getElementById('phone').value,email:document.getElementById('email').value,address:document.getElementById('address').value};if(!c.name||!c.phone)return alert('Name and phone required');if(editIndex>=0){contacts[editIndex]=c;editIndex=-1}else contacts.push(c);localStorage.setItem('contacts',JSON.stringify(contacts));render();['name','phone','email','address'].forEach(id=>document.getElementById(id).value='')}function render(){const s=document.getElementById('search').value.toLowerCase();document.getElementById('list').innerHTML=contacts.filter(c=>c.name.toLowerCase().includes(s)||c.phone.includes(s)).map((c,i)=>`<div class="contact"><div><b>${c.name}</b><br>${c.phone}<br>${c.email}<br>${c.address}</div><div class="actions"><button onclick="edit(${i})">Edit</button><button class="delete" onclick="del(${i})">Delete</button></div></div>`).join('')}function del(i){contacts.splice(i,1);localStorage.setItem('contacts',JSON.stringify(contacts));render()}function edit(i){const c=contacts[i];['name','phone','email','address'].forEach(f=>document.getElementById(f).value=c[f]);editIndex=i;document.querySelector('button[onclick="saveContact()"]').textContent='Update Contact'}render()</script></body></html>
